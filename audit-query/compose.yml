services:
  audit-query:
    build:
      context: .
      dockerfile: Dockerfile
    image: sub2api-audit-query:latest
    container_name: sub2api-audit-query
    restart: unless-stopped
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      NODE_ENV: production
      AUDIT_QUERY_HOST: 0.0.0.0
      AUDIT_QUERY_PORT: 3100
      AUDIT_QUERY_TOKEN_SHA256: ${AUDIT_QUERY_TOKEN_SHA256:?AUDIT_QUERY_TOKEN_SHA256 is required}
      AUDIT_QUERY_POSTGRES_URL: ${AUDIT_QUERY_POSTGRES_URL:?AUDIT_QUERY_POSTGRES_URL is required}
      AUDIT_QUERY_POSTGRES_POOL_MAX: ${AUDIT_QUERY_POSTGRES_POOL_MAX:-5}
      AUDIT_QUERY_POSTGRES_STATEMENT_TIMEOUT_MS: ${AUDIT_QUERY_POSTGRES_STATEMENT_TIMEOUT_MS:-30000}
      AUDIT_QUERY_S3_ENDPOINT: ${AUDIT_QUERY_S3_ENDPOINT:?AUDIT_QUERY_S3_ENDPOINT is required}
      AUDIT_QUERY_S3_BUCKET: ${AUDIT_QUERY_S3_BUCKET:-ai-call-audit}
      AUDIT_QUERY_S3_ACCESS_KEY: ${AUDIT_QUERY_S3_ACCESS_KEY:?AUDIT_QUERY_S3_ACCESS_KEY is required}
      AUDIT_QUERY_S3_SECRET_KEY: ${AUDIT_QUERY_S3_SECRET_KEY:?AUDIT_QUERY_S3_SECRET_KEY is required}
      AUDIT_QUERY_S3_REGION: ${AUDIT_QUERY_S3_REGION:-us-east-1}
      AUDIT_QUERY_OBJECT_KEY_PREFIX: ${AUDIT_QUERY_OBJECT_KEY_PREFIX:-ai-call-audit}
      AUDIT_QUERY_DEFAULT_LIST_RANGE_MS: ${AUDIT_QUERY_DEFAULT_LIST_RANGE_MS:-86400000}
      AUDIT_QUERY_MAX_RANGE_MS: ${AUDIT_QUERY_MAX_RANGE_MS:-604800000}
      AUDIT_QUERY_DEFAULT_LIST_LIMIT: ${AUDIT_QUERY_DEFAULT_LIST_LIMIT:-50}
      AUDIT_QUERY_MAX_LIST_LIMIT: ${AUDIT_QUERY_MAX_LIST_LIMIT:-200}
      AUDIT_QUERY_DEFAULT_EXPORT_LIMIT: ${AUDIT_QUERY_DEFAULT_EXPORT_LIMIT:-1000}
      AUDIT_QUERY_MAX_EXPORT_RECORDS: ${AUDIT_QUERY_MAX_EXPORT_RECORDS:-10000}
      AUDIT_QUERY_EXPORT_BATCH_SIZE: ${AUDIT_QUERY_EXPORT_BATCH_SIZE:-100}
      AUDIT_QUERY_MAX_CONCURRENT_EXPORTS: ${AUDIT_QUERY_MAX_CONCURRENT_EXPORTS:-2}
      AUDIT_QUERY_S3_CONCURRENCY: ${AUDIT_QUERY_S3_CONCURRENCY:-2}
      AUDIT_QUERY_EXPORT_TIMEOUT_MS: ${AUDIT_QUERY_EXPORT_TIMEOUT_MS:-1800000}
      AUDIT_QUERY_MAX_ARTIFACT_COMPRESSED_BYTES: ${AUDIT_QUERY_MAX_ARTIFACT_COMPRESSED_BYTES:-33554432}
      AUDIT_QUERY_MAX_ARTIFACT_UNCOMPRESSED_BYTES: ${AUDIT_QUERY_MAX_ARTIFACT_UNCOMPRESSED_BYTES:-104857600}
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:3100/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: ${SUB2API_NETWORK:-deploy_sub2api-network}
    external: true
