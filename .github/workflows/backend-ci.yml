name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Check deployment scripts
        run: |
          /bin/bash -n deploy/apple-container.sh
          /bin/bash deploy/tests/apple-container-test.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.5'
      - name: Unit tests
        working-directory: backend
        run: make test-unit
      - name: Integration tests
        working-directory: backend
        run: make test-integration

  call-audit-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: audit
          POSTGRES_PASSWORD: audit-pass
          POSTGRES_DB: audit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U audit -d audit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - name: Start MinIO
        run: >-
          docker run --rm -d --name call-audit-minio
          -e MINIO_ROOT_USER=audit-access
          -e MINIO_ROOT_PASSWORD=audit-secret-123
          -p 9000:9000 minio/minio server /data
      - name: Wait for MinIO
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs call-audit-minio
          exit 1
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: audit-query/package-lock.json
      - name: Install audit-query dependencies
        working-directory: audit-query
        run: npm ci
      - name: Audit-query unit tests
        working-directory: audit-query
        run: npm test
      - name: Audit-query PostgreSQL and MinIO integration
        working-directory: audit-query
        env:
          RUN_AUDIT_QUERY_INTEGRATION: 'true'
          AUDIT_QUERY_INTEGRATION_POSTGRES_URL: postgresql://audit:audit-pass@127.0.0.1:5432/audit?sslmode=disable
          AUDIT_QUERY_INTEGRATION_S3_ENDPOINT: http://127.0.0.1:9000
          AUDIT_QUERY_INTEGRATION_S3_ACCESS_KEY: audit-access
          AUDIT_QUERY_INTEGRATION_S3_SECRET_KEY: audit-secret-123
        run: npm run test:integration
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Prepare Call Audit schema with migration identity
        working-directory: backend
        env:
          CALL_AUDIT_POSTGRES_URL: postgresql://audit:audit-pass@127.0.0.1:5432/audit?sslmode=disable
        run: go run ./cmd/call-audit-migrate
      - name: Prepare DML-only Call Audit writer
        run: >-
          docker run --rm --network host
          -e PGPASSWORD=audit-pass postgres:16-alpine
          psql -h 127.0.0.1 -U audit -d audit -v ON_ERROR_STOP=1
          -c "CREATE ROLE audit_writer LOGIN PASSWORD 'writer-pass';
          GRANT CONNECT ON DATABASE audit TO audit_writer;
          GRANT USAGE ON SCHEMA public TO audit_writer;
          GRANT SELECT, INSERT, UPDATE, DELETE ON audit_calls, audit_artifacts TO audit_writer;
          GRANT USAGE, SELECT ON SEQUENCE audit_artifacts_id_seq TO audit_writer;"
      - name: Call Audit writer PostgreSQL and MinIO integration
        working-directory: backend
        env:
          RUN_CALL_AUDIT_INTEGRATION: 'true'
          CALL_AUDIT_POSTGRES_URL: postgresql://audit_writer:writer-pass@127.0.0.1:5432/audit?sslmode=disable
          CALL_AUDIT_MIGRATION_POSTGRES_URL: postgresql://audit:audit-pass@127.0.0.1:5432/audit?sslmode=disable
          CALL_AUDIT_S3_ENDPOINT: http://127.0.0.1:9000
          CALL_AUDIT_S3_BUCKET: call-audit-it
          CALL_AUDIT_S3_ACCESS_KEY: audit-access
          CALL_AUDIT_S3_SECRET_KEY: audit-secret-123
        run: go test -run TestDurableProcessorPostgreSQLMinIOIntegration -count=1 -v ./internal/callaudit
      - name: Stop MinIO
        if: always()
        run: docker stop call-audit-minio || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Frontend typecheck and critical vitest
        run: make test-frontend

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.5'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m
          working-directory: backend
